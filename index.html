<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/style.css">
    <title>JS-OUR-TEAM</title>
</head>

<body>
    <div class="container-lg row-gap-3 d-flex flex-column">
        <div class="row">
            <header class="page-header mt-5 d-flex flex-column row-gap-3">
                <h1 class="page-title text-center pb-5 fw-bold">Meet our Team</h1>
                <p class="page-description text-justify">Lorem ipsum dolor sit amet, consectetur adipisicing elit.
                    Itaque eligendi a veritatis libero at iusto similique officia, quasi deleniti obcaecati!
                    Cumque asperiores ex quaerat necessitatibus aliquam? Laudantium qui suscipit corrupti.</p>
            </header>
        </div>
        <div class="row">
            <div class="team-container col-12">
                <div class="row row-gap-3">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="form-container col-12 col-lg-6 offset-lg-3">
                <form action="" class="form form-control d-flex flex-column row-gap-2 py-3" data-bs-theme="dark">
                    <h3 class="text-center form-title">Unisciti al nostro team</h3>
                    <input id ="form-name" type="text" class="form-control" required placeholder="Inserisci il tuo nome">
                    <input id ="form-role" type="text" class="form-control" required placeholder="Inserisci il tuo ruolo">
                    <input id ="form-email" type="email" class="form-control" required placeholder="Inserisci la tua email">
                    <input id ="form-image" type="text" class="form-control" required placeholder="Inserisci la tua immagine">
                    <button class="btn btn-success">Aggiungiti</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/teams.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
